<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Supermarket POS System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🛒</span>
                <h1>EasyMart POS System</h1>
            </div>
            <div class="header-info">
                <span class="date" id="current-date"></span>
                <span class="cashier">Cashier: Admin</span>
            </div>
        </header>

        <!-- Statistics Bar -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat-card-mini">
                <span class="stat-icon">📦</span>
                <div>
                    <span class="stat-value" id="stat-products">0</span>
                    <span class="stat-label">Products</span>
                </div>
            </div>
            <div class="stat-card-mini">
                <span class="stat-icon">⭐</span>
                <div>
                    <span class="stat-value" id="stat-special">0</span>
                    <span class="stat-label">Special</span>
                </div>
            </div>
            <div class="stat-card-mini">
                <span class="stat-icon">⚠️</span>
                <div>
                    <span class="stat-value" id="stat-lowstock">0</span>
                    <span class="stat-label">Low Stock</span>
                </div>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Left: Product Panel -->
            <div class="product-panel">
                <div class="panel-header">
                    <h2>📦 Product Management</h2>
                    <button id="show-add-product" class="btn-icon">➕ Add Product</button>
                </div>
                
                <!-- Category Filter -->
                <div class="category-filter">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="Food & Beverage">🍔 Food & Beverage</button>
                    <button class="filter-btn" data-category="Fresh Produce">🥬 Fresh Produce</button>
                    <button class="filter-btn" data-category="Daily Supplies">🧴 Daily Supplies</button>
                    <button class="filter-btn" data-category="Home Goods">🏠 Home Goods</button>
                </div>
                
                <!-- Product Grid -->
                <div class="product-grid" id="product-grid">
                    <div class="loading">Loading products...</div>
                </div>
            </div>

            <!-- Right: Checkout Panel -->
            <div class="checkout-panel">
                <div class="panel-header">
                    <h2>🧾 Shopping Cart</h2>
                    <button id="clear-cart" class="btn-icon btn-danger">Clear Cart</button>
                </div>
                
                <!-- Cart List -->
                <div class="cart-list" id="cart-list">
                    <div class="empty-cart">🛒 Cart is empty<br>Click on products to add</div>
                </div>
                
                <!-- Checkout Summary -->
                <div class="checkout-summary">
                    <div class="summary-row">
                        <span>Total Items:</span>
                        <span id="total-items" class="summary-value">0</span>
                    </div>
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal" class="summary-value">$0.00</span>
                    </div>
                    <div class="summary-row discount">
                        <span>Discount:</span>
                        <span id="discount" class="summary-value">-$0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total-amount" class="summary-value">$0.00</span>
                    </div>
                    
                    <!-- Coupon Selection -->
                    <div class="coupon-section">
                        <select id="coupon-select">
                            <option value="none">No Coupon</option>
                            <option value="fixed10">🎫 Save $10 on $100+</option>
                            <option value="fixed20">🎫 Save $20 on $200+</option>
                            <option value="percent10">🎫 10% Off</option>
                        </select>
                        <button id="apply-coupon" class="btn-small">Apply</button>
                    </div>
                    
                    <!-- Payment Methods -->
                    <div class="payment-section">
                        <label>Payment Method:</label>
                        <div class="payment-options">
                            <label class="payment-option">
                                <input type="radio" name="payment" value="cash" checked> 💵 Cash
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment" value="card"> 💳 Card
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment" value="alipay"> 📱 Alipay
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment" value="wechat"> 💚 WeChat Pay
                            </label>
                        </div>
                    </div>
                    
                    <button id="checkout-btn" class="btn-checkout">🧾 Checkout</button>
                </div>
            </div>
        </div>

        <!-- Add Product Modal -->
        <div id="product-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>➕ Add New Product</h3>
                    <span class="close">&times;</span>
                </div>
                <form id="add-product-form">
                    <div class="form-group">
                        <label>Barcode *</label>
                        <input type="text" id="prod-barcode" required placeholder="6-13 digit barcode">
                        <small>Unique identifier</small>
                    </div>
                    <div class="form-group">
                        <label>Product Name *</label>
                        <input type="text" id="prod-name" required placeholder="e.g., Mineral Water">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Category *</label>
                            <select id="prod-category">
                                <option value="Food & Beverage">🍔 Food & Beverage</option>
                                <option value="Fresh Produce">🥬 Fresh Produce</option>
                                <option value="Daily Supplies">🧴 Daily Supplies</option>
                                <option value="Home Goods">🏠 Home Goods</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Price ($) *</label>
                            <input type="number" id="prod-price" min="0" step="0.01" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Stock Quantity *</label>
                            <input type="number" id="prod-stock" min="0" value="100" required>
                        </div>
                        <div class="form-group">
                            <label>Special Offer</label>
                            <select id="prod-special">
                                <option value="false">No</option>
                                <option value="true">⭐ Yes (Special)</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">✅ Add Product</button>
                </form>
            </div>
        </div>

        <!-- Receipt Modal -->
        <div id="receipt-modal" class="modal">
            <div class="modal-content receipt">
                <div class="modal-header">
                    <h3>🧾 Receipt</h3>
                    <span class="close-receipt">&times;</span>
                </div>
                <div id="receipt-content" class="receipt-content"></div>
                <button id="print-receipt" class="btn-primary">🖨️ Print Receipt</button>
            </div>
        </div>

        <!-- Toast Message -->
        <div id="toast-message" class="toast"></div>
    </div>

    <script src="pos.js"></script>
</body>
</html>
